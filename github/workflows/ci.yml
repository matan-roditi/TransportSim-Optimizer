name: CI - Static Analysis & Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Static Analysis 
      - name: Run Ruff (Linter & Formatter)
        run: ruff check . --fix
        
      # Static Type Checking with Mypy
      - name: Run Mypy (Type Check)
        run: mypy . --ignore-missing-imports

      # Run Unit Tests with Coverage Report
      - name: Run Tests with Coverage
        run: |
          pytest --cov=src --cov-report=term-missing
        env:
          # Here you can add environment variables if the tests require a temporary connection to the DB
          DATABASE_URL: postgresql://user:pass@localhost:5432/test_db

      # 4. Block Merge if Coverage is Too Low (Optional)
      - name: Check Coverage Threshold
        run: |
          coverage_pct=$(coverage report | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          if [ "$coverage_pct" -lt 80 ]; then
            echo "Code coverage is below 80% ($coverage_pct%)"
            exit 1
          fi