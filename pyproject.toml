[tool.ruff]
# Standard line length (similar to Black)
line-length = 88

[tool.ruff.lint]
# Rule selection: E (Errors), F (Pyflakes), I (Import sorting), W (Warnings)
select = ["E", "F", "I", "W"]
ignore = ["E501", "W291"]

[tool.mypy]
python_version = "3.10"
# Require type definitions in all functions
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
mypath = "src"
explicit_package_bases = true

[tool.pytest.ini_options]
# Define the directory where tests are located
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
# Measure code coverage only on the source directory
source = ["src"]

[tool.coverage.report]
# Show missing lines in the terminal report
show_missing = true